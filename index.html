<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Đèn Kéo Quân </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Không gian 3D */
        .scene {
            width: 250px;
            height: 200px;
            perspective: 1200px;
        }


        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-10deg); 
        }

        /* Các mặt của đèn (6 mặt) */
        .carousel__cell {
            position: absolute;
            width: 240px;
            height: 190px;
            left: 5px;
            top: 5px;
            border: 3px solid #ffcc00;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.5s, box-shadow 0.3s;
        }

        .carousel__cell:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.9);
            border-color: #fff;
        }

        .carousel__cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Vị trí 6 mặt (360 độ / 6 = 60 độ mỗi mặt) 
           Khoảng cách Z = width / 2 / tan(30 độ) ~ 207px (lấy 250px cho thoáng) */
        .carousel__cell:nth-child(1) { transform: rotateY(  0deg) translateZ(250px); }
        .carousel__cell:nth-child(2) { transform: rotateY( 60deg) translateZ(250px); }
        .carousel__cell:nth-child(3) { transform: rotateY(120deg) translateZ(250px); }
        .carousel__cell:nth-child(4) { transform: rotateY(180deg) translateZ(250px); }
        .carousel__cell:nth-child(5) { transform: rotateY(240deg) translateZ(250px); }
        .carousel__cell:nth-child(6) { transform: rotateY(300deg) translateZ(250px); }
    </style>
</head>
<body>

    <h1>Hiệu Ứng Đèn Kéo Quân 3D</h1>

    <div class="scene">
        <div class="carousel">
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=1" alt="Ảnh 1"></div>
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=2" alt="Ảnh 2"></div>
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=3" alt="Ảnh 3"></div>
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=4" alt="Ảnh 4"></div>
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=5" alt="Ảnh 5"></div>
            <div class="carousel__cell"><img src="https://picsum.photos/300/200?random=6" alt="Ảnh 6"></div>
        </div>
    </div>

    <script>
        const carousel = document.querySelector('.carousel');
        const cells = document.querySelectorAll('.carousel__cell');
        
        let currentAngle = 0;
        let isPaused = false;
        const rotationSpeed = 0.3; // Chỉnh tốc độ quay tại đây

        // Hàm loop để xoay đèn bằng JS
        function animateCarousel() {
            if (!isPaused) {
                currentAngle -= rotationSpeed; 
                // Xoay quanh trục Y, kết hợp góc nhìn chếch trục X -10 độ ban đầu
                carousel.style.transform = `rotateX(-10deg) rotateY(${currentAngle}deg)`;
            }
            requestAnimationFrame(animateCarousel);
        }

        // Bắt sự kiện hover vào từng hình ảnh để dừng/chạy tiếp
        cells.forEach(cell => {
            cell.addEventListener('mouseenter', () => {
                isPaused = true;
            });
            cell.addEventListener('mouseleave', () => {
                isPaused = false;
            });
        });

        // Bắt đầu hiệu ứng
        animateCarousel();
    </script>
</body>
</html>
